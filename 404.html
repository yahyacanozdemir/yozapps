<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — yozapps</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
  <script>
    (function () {
      var t = localStorage.getItem("yoz-theme");
      if (!t) t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
</head>
<body>
  <main class="hero" style="min-height: 80vh; display: flex; align-items: center;">
    <div class="container" style="text-align: center;">
      <h1 class="hero-title">404</h1>
      <p class="hero-subtitle">Sayfa bulunamadı · Page not found</p>
      <div class="hero-actions">
        <a class="btn btn-primary" href="/">yozapps.com</a>
      </div>
    </div>
  </main>
</body>
</html>
